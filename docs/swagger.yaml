          schema:
            $ref: '#/definitions/github_com_Ravenmax_ToDo_internal_core_transport_http_response.ErrorResponse'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/github_com_Ravenmax_ToDo_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_Ravenmax_ToDo_internal_core_transport_http_response.ErrorResponse'
      summary: Список пользователей
      tags:
      - Users
    post:
      consumes:
      - application/json
      description: Создание пользователя в системе из json body запроса
      parameters:
      - description: CreateUser тело запроса
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_features_users_transport_http.CreateUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Успешно созданный пользователь
          schema:
            $ref: '#/definitions/internal_features_users_transport_http.CreateUserResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_Ravenmax_ToDo_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_Ravenmax_ToDo_internal_core_transport_http_response.ErrorResponse'
      summary: Создание пользователя
      tags:
      - Users
  /users/{id}:
    delete:
      description: Удаление пользователя по входящему ID
      parameters:
      - description: ID удаляемого пользователя
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: Успешное удаление пользователя
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_Ravenmax_ToDo_internal_core_transport_http_response.ErrorResponse'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/github_com_Ravenmax_ToDo_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_Ravenmax_ToDo_internal_core_transport_http_response.ErrorResponse'
      summary: Удаление пользователя
      tags:
      - Users
    get:
      description: Получения пользователя по ID
      parameters:
      - description: ID пользователя
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Найденный пользователь
          schema:
            $ref: '#/definitions/internal_features_users_transport_http.GetUserReponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_Ravenmax_ToDo_internal_core_transport_http_response.ErrorResponse'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/github_com_Ravenmax_ToDo_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_Ravenmax_ToDo_internal_core_transport_http_response.ErrorResponse'
      summary: Получение пользователя
      tags:
      - Users
    patch:
      consumes:
      - application/json
      description: |-
        Обновления пользователя с заданным ID по JSON из тела запроса
        ### Логика обновления полей (Three-state logic):
        1.**Поле явно не передано**: `"phone_number"`, значение в БД не меняется.
        1.**Явно передано значение**: `"phone_number":"+73336669999"`, устанавливаем новый номер телефона.
        1.**Поле явно не передано**: `"phone_number":null`, очищаем поле в БД.
        Ограничения: `full_name` не может быть null.
      parameters:
      - description: ID пользователя
        in: path
        name: id
        required: true
        type: integer
      - description: PatchUserRequest тело запроса
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_features_users_transport_http.PatchUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Успешное обновление пользователя
          schema:
            $ref: '#/definitions/internal_features_users_transport_http.PatchUserResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_Ravenmax_ToDo_internal_core_transport_http_response.ErrorResponse'
        "404":
