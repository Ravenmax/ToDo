host: 127.0.0.1:5050
info:
  contact: {}
  description: ToDo application rest api scheme
  title: ToDo API
  version: "1.0"
paths:
  /statistics:
    get:
      description: Просмотр статистики по задачам с опциональными параметрами
      parameters:
      - description: Задачи пользователя с ID
        in: query
        name: userid
        type: integer
      - description: Начало промежутка рассмотрения статистики(включительно), формат
          YYYY-MM-DD
        format: date
        in: query
        name: from
        type: string
      - description: Конец промежутка рассмотрения статистики(не включительно), формат
          YYYY-MM-DD
        format: date
        in: query
        name: to
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Успешное получение статистики по задачам
          schema:
            $ref: '#/definitions/internal_features_statistics_transport_http.GetStatisticsResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_Ravenmax_ToDo_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_Ravenmax_ToDo_internal_core_transport_http_response.ErrorResponse'
      summary: Статистика по задачам
      tags:
      - Statistics
  /tasks:
    get:
      description: Просмотр списка задач с опциональными параметрами
      parameters:
      - description: Задачи пользователя с ID
        in: query
        name: userid
        type: integer
      - description: Размер страницы с задачами
        in: query
        name: limit
        type: integer
      - description: Смещение страницы с задачами
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Успешное получение списка задач
          schema:
            items:
              $ref: '#/definitions/internal_features_tasks_transport_http.TaskDTOResponce'
            type: array
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_Ravenmax_ToDo_internal_core_transport_http_response.ErrorResponse'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/github_com_Ravenmax_ToDo_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_Ravenmax_ToDo_internal_core_transport_http_response.ErrorResponse'
      summary: Список задач
      tags:
      - Users
    post:
      consumes:
      - application/json
      description: Создание задачи в системе из json body запроса
      parameters:
      - description: CreateTask тело запроса
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_features_tasks_transport_http.CreateTaskRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Успешно созданный пользователь
          schema:
            $ref: '#/definitions/internal_features_tasks_transport_http.CreateTaskResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_Ravenmax_ToDo_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_Ravenmax_ToDo_internal_core_transport_http_response.ErrorResponse'
      summary: Создание задачи
      tags:
      - Tasks
  /tasks/{id}:
    delete:
      description: Удаление задачи по входящему ID
      parameters:
      - description: ID удаляемой задачи
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: Успешное удаление задачи
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_Ravenmax_ToDo_internal_core_transport_http_response.ErrorResponse'
        "404":
          description: Task not found
          schema:
            $ref: '#/definitions/github_com_Ravenmax_ToDo_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_Ravenmax_ToDo_internal_core_transport_http_response.ErrorResponse'
      summary: Удаление задачи
      tags:
      - Tasks
    get:
      description: Получения задачи по ID
      parameters:
      - description: ID задачи
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Найденный пользователь
          schema:
            $ref: '#/definitions/internal_features_tasks_transport_http.CreateTaskResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_Ravenmax_ToDo_internal_core_transport_http_response.ErrorResponse'
        "404":
          description: Task not found
          schema:
            $ref: '#/definitions/github_com_Ravenmax_ToDo_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_Ravenmax_ToDo_internal_core_transport_http_response.ErrorResponse'
      summary: Получение задачи
      tags:
      - Tasks
    patch:
      consumes:
      - application/json
      description: |-
        Обновление задачи с заданным ID по JSON из тела запроса
        ### Логика обновления полей (Three-state logic):
        1.**Поле явно не передано**: `"description"`, значение в БД не меняется.
        1.**Явно передано значение**: `"description":"сделать дз по русскому"`, устанавливаем новое описание.
        1.**Поле явно не передано**: `"description":null`, очищаем поле в БД.
        Ограничения: `title` не может быть null.
      parameters:
      - description: ID задачи
        in: path
        name: id
        required: true
        type: integer
      - description: PatchTaskRequest тело запроса
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_features_tasks_transport_http.PatchTaskRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Успешное обновление задачи
          schema:
            $ref: '#/definitions/internal_features_tasks_transport_http.PatchTaskReponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_Ravenmax_ToDo_internal_core_transport_http_response.ErrorResponse'
        "404":
          description: Task not found
          schema:
            $ref: '#/definitions/github_com_Ravenmax_ToDo_internal_core_transport_http_response.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/github_com_Ravenmax_ToDo_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_Ravenmax_ToDo_internal_core_transport_http_response.ErrorResponse'
      summary: Обновление задачи
      tags:
      - Tasks
  /users:
