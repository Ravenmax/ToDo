services:
    todoapp-postgres:
        image: postgres:18.3-bookworm
        container_name: todo-env-postgres
        environment:
            - POSTGRES_USER=${POSTGRES_USER}
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            - POSTGRES_DB=${POSTGRES_DB}
        volumes:
         - ${PROJECT_ROOT}/out/pgdata:var/lib/postgresql
        restart: always 

